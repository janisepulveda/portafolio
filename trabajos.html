<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="cerrarModal" class="modal-close">&times;</span>

    <h2 id="modalTitulo"></h2>
    <p id="modalAno"></p>

    <div class="modal-body">
      <div class="modal-descripcion">
        <p id="modalDescripcion"></p>
        <p><strong>Tags:</strong> <span id="modalTags"></span></p>
      </div>
      <div class="modal-fotos" id="modalFotos"></div>
    </div>

  </div>
</div>

<script src="trabajos.js"></script>
<script>
  const footer = document.getElementById("footerBar");
  window.addEventListener("scroll", () => {
    const scrollPos = window.scrollY + window.innerHeight;
    const docHeight = document.documentElement.scrollHeight;
    footer.classList.toggle("visible", scrollPos >= docHeight - 5);
  });

  // Hamburger menu
  (function(){
    const btn = document.querySelector('.hamburger');
    const menu = document.querySelector('.menu');
    if(!btn || !menu) return;
    btn.addEventListener('click', ()=>{
      const open = menu.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
    });
    menu.querySelectorAll('a').forEach(a=>a.addEventListener('click', ()=>{ menu.classList.remove('open'); btn.setAttribute('aria-expanded', false);}));
  })();
  
  // CV preview modal
  const cvBtn = document.getElementById('cvPreviewBtn');
  const cvModal = document.getElementById('cvModal');
  const cerrarCv = document.getElementById('cerrarCvModal');
  const cvFrame = document.getElementById('cvFrame');

  cvBtn.addEventListener('click', (e) => {
    e.preventDefault();
    cvModal.style.display = 'flex';
    // ensure fresh load
    cvFrame.src = 'assets/cv_janis.pdf';
  });

  cerrarCv.addEventListener('click', () => { cvModal.style.display = 'none'; cvFrame.src = ''; });
  cvModal.addEventListener('click', (e) => { if(e.target === cvModal){ cvModal.style.display='none'; cvFrame.src = ''; } });
</script>

</body>
