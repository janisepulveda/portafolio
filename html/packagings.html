<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Título del Proyecto — Janis Sepúlveda Vera</title>

  <link rel="stylesheet" href="https://use.typekit.net/rlo4oiq.css">
  <link rel="stylesheet" href="../style.css" />

  <style>
    /* === ESTRUCTURA GENERAL === */
    body {
      font-family: "sofia-pro", Helvetica, Arial, sans-serif;
      color: #111;
      background: #fff;
      margin: 0;
    }

    header {
      background: white;
      border-bottom: 1px solid #ddd;
      padding: 1.2rem 2rem;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-style: italic;
      font-size: 1.2rem;
    }

    nav h1 {
      font-weight: 500;
      font-size: 1.6rem;
      margin: 0;
    }

    /* === CONTENIDO DEL PROYECTO === */
    main {
      max-width: 1100px;
      margin: 6rem auto;
      padding: 0 4rem;
      text-align: center;
    }

    .titulo {
      font-weight: 700;
      font-size: 3rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.03em;
    }

    .subtitulo {
      font-weight: 400;
      font-size: 1rem;
      color: #555;
      margin-bottom: 2rem;
    }

    .descripcion {
      font-weight: 400;
      font-size: 1.1rem;
      line-height: 1.6;
      max-width: 700px;
      margin: 0 auto 4rem auto;
    }

    /* === GALERÍA === */
    .galeria {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    figure {
      margin: 0;
      max-width: 800px;
    }

    figure img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
    }

    figcaption {
      font-size: 0.9rem;
      color: #666;
      margin-top: 0.5rem;
      text-align: center;
      font-weight: 400;
    }

    @media (max-width: 900px) {
      main {
        padding: 0 2rem;
        margin: 4rem auto;
      }

      .titulo {
        font-size: 2.2rem;
      }

      .descripcion {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <nav>
      <a href="../projects.html" class="nav-left">projects</a>
      <h1><a href="index.html">janis sepúlveda vera</a></h1>
      <a href="../about.html" class="nav-right">about</a>
    </nav>
  </header>

  <main>
    <!-- === INFORMACIÓN DEL PROYECTO === -->
    <h1 class="titulo">Colección de Packagings</h1>
    <h2 class="subtitulo">2024</h2>
    <p class="descripcion">
      Colección de packagings diseñados para productos de distintas marcas, enfocándose en la funcionalidad y estética del empaque para mejorar la experiencia del usuario y destacar en el mercado.
    </p>

    <!-- === GALERÍA DE IMÁGENES === -->
    <section class="galeria">
      <figure>
        <img src="../assets/industrial/packaging01.png" alt="Calendario de adviento Blush Bar">
        <img src="../assets/industrial/packaging1.png" alt="Calendario de adviento Blush Bar">
        <figcaption>Calendario de adviento Blush Bar.</figcaption>
      </figure>

      <figure>
        <img src="../assets/industrial/packaging2.png" alt="La sazonería">
        <figcaption>La sazonería sal especiada.</figcaption>
      </figure>
    </section>
  </main>

</body>
</html>
