<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — Janis Sepúlveda</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="contacto-body">

  <header class="hero">
    <a href="index.html" class="logo"><img src="assets/placeholder.png" alt="Logo"></a>
    <nav class="menu">
      <ul>
        <li><a href="trabajos.html">Trabajos</a></li>
        <li><a href="sobremi.html">Sobre mí</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
    <div class="email-btn">
      <a href="assets/cv_janis.pdf" download class="cv-download-link">CV</a>
    </div>
  </header>

  <main class="contacto-wrapper">
    <div class="postal-container">
      <img src="assets/contacto/contacto.png" alt="Postal" class="postal-img">
      <form id="my-form" class="postal-form" action="https://formspree.io/f/mwvvegwq" method="POST">
        <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
        <div class="form-group"><label>Mensaje</label><textarea name="mensaje" rows="3" required></textarea></div>
        <button type="button" id="submit-btn" class="send-btn">Enviar mensaje</button>
      </form>
    </div>

    <div class="stamps-container">
      <div class="estampilla-flotante est-1">
        <img src="assets/contacto/estampilla1.png">
      </div>
      <div class="estampilla-flotante est-2"><img src="assets/contacto/estampilla2.png"></div>
      <div class="estampilla-flotante est-3"><img src="assets/contacto/estampilla3.png"></div>
      <div class="estampilla-flotante est-4"><img src="assets/contacto/instruccion.png"></div>
      <!-- <div class="estampilla-flotante est-5"><img src="assets/contacto/estampilla5.png"></div> -->
    </div>
  </main>

  <script>
    const stamps = document.querySelectorAll('.estampilla-flotante');

    stamps.forEach(stamp => {
      let isDragging = false;
      let startX, startY, initialLeft, initialTop;

      stamp.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isDragging = true;

        // Medimos primero con la rotación aplicada
        const rectBefore = stamp.getBoundingClientRect();
        initialLeft = rectBefore.left;
        initialTop = rectBefore.top;
        startX = e.clientX;
        startY = e.clientY;

        // Fijamos posición para iniciar el drag exactamente donde está
        stamp.style.position = 'fixed';
        stamp.style.left = initialLeft + 'px';
        stamp.style.top = initialTop + 'px';
        stamp.style.right = 'auto';
        stamp.style.zIndex = '1000';

        // Ahora removemos la clase de rotación, pero compensamos cualquier
        // cambio en el bounding box para que el elemento no salte
        const classes = Array.from(stamp.classList);
        const rotClass = classes.find(c => c.startsWith('est-'));
        if (rotClass) {
          stamp.classList.remove(rotClass);
          // después de quitar la clase, medir de nuevo
          const rectAfter = stamp.getBoundingClientRect();
          const dxShift = rectAfter.left - rectBefore.left;
          const dyShift = rectAfter.top - rectBefore.top;
          // compensar el cambio
          const compensatedLeft = initialLeft - dxShift;
          const compensatedTop = initialTop - dyShift;
          stamp.style.left = compensatedLeft + 'px';
          stamp.style.top = compensatedTop + 'px';
          // actualizar iniciales para el cálculo del drag
          initialLeft = compensatedLeft;
          initialTop = compensatedTop;
        }
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        stamp.style.left = (initialLeft + dx) + 'px';
        stamp.style.top = (initialTop + dy) + 'px';
      });

      // Touch support
      stamp.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isDragging = true;
        const touch = e.touches[0];
        // measure before removing rotation class
        const rectBefore = stamp.getBoundingClientRect();
        initialLeft = rectBefore.left;
        initialTop = rectBefore.top;
        startX = touch.clientX;
        startY = touch.clientY;
        stamp.style.position = 'fixed';
        stamp.style.left = initialLeft + 'px';
        stamp.style.top = initialTop + 'px';
        stamp.style.right = 'auto';
        stamp.style.zIndex = '1000';

        const classes = Array.from(stamp.classList);
        const rotClass = classes.find(c => c.startsWith('est-'));
        if (rotClass) {
          stamp.classList.remove(rotClass);
          const rectAfter = stamp.getBoundingClientRect();
          const dxShift = rectAfter.left - rectBefore.left;
          const dyShift = rectAfter.top - rectBefore.top;
          const compensatedLeft = initialLeft - dxShift;
          const compensatedTop = initialTop - dyShift;
          stamp.style.left = compensatedLeft + 'px';
          stamp.style.top = compensatedTop + 'px';
          initialLeft = compensatedLeft;
          initialTop = compensatedTop;
        }
      }, { passive: false });

      document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        stamp.style.left = (initialLeft + dx) + 'px';
        stamp.style.top = (initialTop + dy) + 'px';
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchend', () => { isDragging = false; });

      document.addEventListener('mouseup', () => { isDragging = false; });
    });

    // Formspree
    const form = document.getElementById('my-form');
    const btn = document.getElementById('submit-btn');
    btn.addEventListener('click', async () => {
      if (!form.checkValidity()) { form.reportValidity(); return; }
      btn.innerText = "Enviando...";
      const response = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) { btn.innerText = "Enviado"; form.reset(); }
    });
  </script>
</body>
</html>
