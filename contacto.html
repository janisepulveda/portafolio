<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — Janis Sepúlveda</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="contacto-body">

  <header class="hero">
    <a href="index.html" class="logo"><img src="assets/placeholder.png" alt="Logo"></a>
    <nav class="menu">
      <ul>
        <li><a href="trabajos.html">Trabajos</a></li>
        <li><a href="sobremi.html">Sobre mí</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
    <div class="email-btn"><a href="mailto:v.sepulvedajanis@gmail.com">Email</a></div>
  </header>

  <main class="contacto-wrapper">
    <div class="postal-container">
      <img src="assets/contacto/contacto.png" alt="Postal" class="postal-img">
      <form id="my-form" class="postal-form" action="https://formspree.io/f/mwvvegwq" method="POST">
        <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
        <div class="form-group"><label>Mensaje</label><textarea name="mensaje" rows="3" required></textarea></div>
        <button type="button" id="submit-btn" class="send-btn">Enviar mensaje</button>
      </form>
    </div>

    <div class="stamps-container">
      <div class="estampilla-flotante est-1">
        <img src="assets/contacto/estampilla1.png">
      </div>
      <div class="estampilla-flotante est-2"><img src="assets/contacto/estampilla2.png"></div>
      <div class="estampilla-flotante est-3"><img src="assets/contacto/estampilla3.png"></div>
      <div class="estampilla-flotante est-4"><img src="assets/contacto/instruccion.png"></div>
      <!-- <div class="estampilla-flotante est-5"><img src="assets/contacto/estampilla5.png"></div> -->
    </div>
  </main>

  <script>
    const stamps = document.querySelectorAll('.estampilla-flotante');

    stamps.forEach(stamp => {
      let isDragging = false;
      let startX, startY, initialLeft, initialTop;

      stamp.addEventListener('mousedown', (e) => {
        e.preventDefault(); 
        isDragging = true;
        
        // --- EL TRUCO --- 
        // Al tocarla, le quitamos la clase est-1, est-2, etc. 
        // Esto elimina la rotación del CSS y la deja en 0 grados.
        const classes = Array.from(stamp.classList);
        const rotClass = classes.find(c => c.startsWith('est-'));
        if (rotClass) stamp.classList.remove(rotClass);

        const rect = stamp.getBoundingClientRect();
        initialLeft = rect.left;
        initialTop = rect.top;
        startX = e.clientX;
        startY = e.clientY;

        stamp.style.position = 'fixed';
        stamp.style.left = initialLeft + 'px';
        stamp.style.top = initialTop + 'px';
        stamp.style.right = 'auto';
        stamp.style.zIndex = '1000';
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        stamp.style.left = (initialLeft + dx) + 'px';
        stamp.style.top = (initialTop + dy) + 'px';
      });

      document.addEventListener('mouseup', () => { isDragging = false; });
    });

    // Formspree
    const form = document.getElementById('my-form');
    const btn = document.getElementById('submit-btn');
    btn.addEventListener('click', async () => {
      if (!form.checkValidity()) { form.reportValidity(); return; }
      btn.innerText = "Enviando...";
      const response = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) { btn.innerText = "Enviado"; form.reset(); }
    });
  </script>
</body>
</html>
