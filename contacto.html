<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — Janis Sepúlveda</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="contacto-body">

  <header class="hero">
    <a href="index.html" class="logo">
      <img src="assets/placeholder.png" alt="Logo">
    </a>
    <nav class="menu">
      <ul>
        <li><a href="trabajos.html">Trabajos</a></li>
        <li><a href="sobremi.html">Sobre mí</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
    <div class="email-btn">
      <a href="mailto:v.sepulvedajanis@gmail.com">Email</a>
    </div>
  </header>

  <main class="contacto-wrapper">
    <div class="postal-container">
      <img src="assets/contacto/contacto.png" alt="Postal" class="postal-img">
      
      <form id="my-form" class="postal-form" action="https://formspree.io/f/mwvvegwq" method="POST">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" rows="3" required></textarea>
        </div>

        <button type="button" id="submit-btn" class="send-btn">Enviar mensaje</button>
      </form>
    </div>
  </main>

  <script>
    const form = document.getElementById('my-form');
    const btn = document.getElementById('submit-btn');

    btn.addEventListener('click', async function() {
      // 1. Validar que los campos no estén vacíos
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const formData = new FormData(form);
      
      // 2. Cambiar visual del botón mientras envía
      btn.innerText = "Enviando...";
      btn.disabled = true;

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          // 3. ÉXITO: El botón cambia a Enviado
          btn.innerText = "Enviado";
          btn.style.backgroundColor = "#4b7730"; // Cambia a verde
          form.reset(); // Limpia la postal
        } else {
          btn.innerText = "Error";
          btn.disabled = false;
        }
      } catch (error) {
        btn.innerText = "Error de red";
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
